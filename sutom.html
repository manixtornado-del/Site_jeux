<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutom ♡ Mots Doux</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rose: #f7c5d5; --rose-d: #e8809e; --rose-l: #fdeef4;
  --lavande: #d4c5f7; --lavande-d: #9b82e0;
  --menthe: #c5f0e0; --menthe-d: #5bc9a0; --menthe-l: #edfbf5;
  --jaune: #fde68a; --jaune-d: #d97706;
  --crème: #fef8f0; --beige: #f5ede0;
  --brun-d: #7a5c4a; --brun: #b08a72;
  --blanc: #ffffff; --texte: #4a3728; --texte-doux: #8a6d5e;
  --shadow: rgba(180,130,110,0.15);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Quicksand', sans-serif;
  background: var(--crème);
  color: var(--texte);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 15% 15%, rgba(247,197,213,0.28) 0%, transparent 50%),
    radial-gradient(circle at 85% 85%, rgba(212,197,247,0.22) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(254,248,240,0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1.5px solid rgba(180,130,110,0.1);
  padding: 0.75rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo {
  font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 800;
  color: var(--texte); text-decoration: none; display: flex; align-items: center; gap: 0.4rem;
}
.nav-logo span { color: var(--rose-d); }
.nav-links { display: flex; gap: 0.4rem; list-style: none; }
.nav-links a {
  text-decoration: none; font-size: 0.82rem; font-weight: 600;
  color: var(--texte-doux); padding: 0.3rem 0.75rem; border-radius: 100px;
  transition: background 0.15s, color 0.15s; border: 1.5px solid transparent;
}
.nav-links a:hover { background: var(--beige); color: var(--texte); }
.nav-links a.active {
  background: var(--blanc); color: var(--texte);
  border-color: rgba(180,130,110,0.2); box-shadow: 0 2px 8px var(--shadow);
}

/* LAYOUT */
.page { position: relative; z-index: 10; max-width: 560px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.page-header { text-align: center; margin-bottom: 1.5rem; }
.page-icon {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--blanc); display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.7rem; box-shadow: 0 4px 16px var(--shadow), 0 0 0 5px rgba(247,197,213,0.3);
  margin-bottom: 0.7rem;
  animation: bobble 3s ease-in-out infinite;
}
@keyframes bobble {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-5px) rotate(3deg); }
}
.page-title {
  font-family: 'Nunito', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--texte);
}
.page-sub { font-size: 0.88rem; color: var(--texte-doux); margin-top: 0.3rem; font-weight: 500; }

/* Infos badges */
.info-row {
  display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem;
}
.info-pill {
  background: var(--blanc); border-radius: 100px; padding: 0.3rem 0.85rem;
  font-size: 0.78rem; font-weight: 600; color: var(--texte-doux);
  box-shadow: 0 2px 8px var(--shadow); border: 1.5px solid rgba(180,130,110,0.1);
}

/* GRILLE */
.grid-wrap {
  display: flex; flex-direction: column; gap: 0.45rem;
  align-items: center; margin-bottom: 1.5rem;
}
.grid-row { display: flex; gap: 0.45rem; }
.cell {
  width: 52px; height: 52px;
  border-radius: 14px;
  border: 2px solid rgba(180,130,110,0.2);
  background: var(--blanc);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif; font-size: 1.4rem; font-weight: 800;
  color: var(--texte);
  transition: border-color 0.15s, transform 0.1s;
  position: relative; overflow: hidden;
  user-select: none;
}
.cell.active-row { border-color: rgba(180,130,110,0.45); }
.cell.filled { border-color: var(--rose-d); animation: pop 0.15s ease; }
@keyframes pop { 0% { transform: scale(1.1); } 100% { transform: scale(1); } }

/* Résultats */
.cell.correct  { background: var(--menthe-d); border-color: var(--menthe-d); color: #fff; animation: flip 0.4s ease forwards; }
.cell.present  { background: var(--jaune);    border-color: var(--jaune-d);  color: var(--texte); animation: flip 0.4s ease forwards; }
.cell.absent   { background: #c9b5a8;          border-color: #c9b5a8;         color: #fff; animation: flip 0.4s ease forwards; }
/* First letter always revealed */
.cell.given { background: var(--rose); border-color: var(--rose-d); color: var(--texte); }

@keyframes flip {
  0%   { transform: scaleY(1); }
  50%  { transform: scaleY(0); }
  100% { transform: scaleY(1); }
}
.cell.shake { animation: shake 0.4s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-5px); }
  60%      { transform: translateX(5px); }
}

/* LÉGENDE */
.legend {
  display: flex; gap: 0.7rem; justify-content: center; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.78rem; font-weight: 600; color: var(--texte-doux); }
.legend-dot {
  width: 18px; height: 18px; border-radius: 6px; flex-shrink: 0;
  display: inline-block;
}

/* CLAVIER */
.keyboard { display: flex; flex-direction: column; gap: 0.45rem; align-items: center; margin-bottom: 1.5rem; }
.kb-row { display: flex; gap: 0.35rem; justify-content: center; }
.kb-key {
  min-width: 34px; height: 46px; padding: 0 0.5rem;
  border-radius: 10px; border: none;
  background: var(--blanc);
  color: var(--texte);
  font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 6px var(--shadow);
  transition: transform 0.1s, background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.kb-key:hover { transform: scale(1.06); background: var(--beige); }
.kb-key:active { transform: scale(0.94); }
.kb-key.wide { min-width: 54px; font-size: 0.75rem; }
.kb-key.correct { background: var(--menthe-d); color: #fff; }
.kb-key.present { background: var(--jaune); color: var(--texte); }
.kb-key.absent  { background: #c9b5a8; color: #fff; }

/* RÉSULTAT */
.result-banner {
  display: none; text-align: center;
  background: var(--blanc); border-radius: 20px;
  padding: 1.5rem; box-shadow: 0 4px 20px var(--shadow);
  border: 1.5px solid rgba(180,130,110,0.12);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  margin-bottom: 1rem;
}
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.result-banner.show { display: block; }
.result-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.result-title { font-family: 'Nunito', sans-serif; font-size: 1.4rem; font-weight: 800; margin-bottom: 0.3rem; }
.result-word { color: var(--texte-doux); font-size: 0.9rem; margin-bottom: 1rem; }
.result-word strong { color: var(--texte); font-weight: 700; }
.result-btns { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }

/* Bouton */
.btn {
  background: var(--texte); color: var(--blanc);
  border: none; border-radius: 100px;
  padding: 0.55rem 1.3rem;
  font-family: 'Quicksand', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: background 0.2s, transform 0.15s;
  text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
}
.btn:hover { background: var(--brun-d); transform: scale(1.03); }
.btn-outline {
  background: transparent; color: var(--texte-doux);
  border: 1.5px solid rgba(180,130,110,0.3);
}
.btn-outline:hover { background: var(--beige); }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--texte); color: var(--blanc);
  padding: 0.7rem 1.4rem; border-radius: 100px;
  font-weight: 600; font-size: 0.9rem;
  z-index: 200; opacity: 0;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 420px) {
  .cell { width: 44px; height: 44px; font-size: 1.2rem; border-radius: 11px; }
  .kb-key { min-width: 28px; height: 42px; font-size: 0.8rem; }
  .kb-key.wide { min-width: 46px; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">🌸 Mots <span>Doux</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="sutom.html" class="active">🔤 Sutom</a></li>
    <li><a href="wiki.html">📖 Wikipédia</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-icon">🔤</div>
    <h1 class="page-title">Sutom</h1>
    <p class="page-sub">Trouve le mot du jour en 6 essais ✨</p>
  </div>

  <div class="info-row">
    <span class="info-pill" id="pill-date">📅 chargement…</span>
    <span class="info-pill" id="pill-tries">🎯 6 essais restants</span>
    <span class="info-pill">🔤 6 lettres</span>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--menthe-d)"></span>Bonne place</div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--jaune)"></span>Mauvaise place</div>
    <div class="legend-item"><span class="legend-dot" style="background:#c9b5a8"></span>Absent</div>
  </div>

  <div class="grid-wrap" id="grid"></div>

  <div class="result-banner" id="result">
    <div class="result-icon" id="res-icon">🎉</div>
    <div class="result-title" id="res-title">Bravo !</div>
    <div class="result-word" id="res-word"></div>
    <div class="result-btns">
      <a href="wiki.html" class="btn">📖 Jouer à Wikipédia</a>
      <a href="index.html" class="btn btn-outline">🏠 Accueil</a>
    </div>
  </div>

  <div class="keyboard" id="keyboard"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORDS = ["MAISON","JARDIN","SOLEIL","MOUTON","CANARD","PIERRE","ARBRES","BALCON","BEAUTE","MANGER","DORMIR","FACILE","RAPIDE","HERBES","CHEMIN","NUAGES","FLEURS","CHARME","BRAISE","SAVOIR","VALISE","MIROIR","DESERT","VOYAGE","PAROLE","NATURE","PLUMES","CANAPE","BUREAU","MARCHE","BATEAU","AVENIR","BOUGIE","CHAUDE","FROIDE","CHEVRE","LIERRE","MENTHE","ORANGE","CERISE","BANANE","MANGUE","CASQUE","FLECHE","NUANCE","TRUITE","SAUMON","JARRES","BOUTON","CRAYON","CAHIER","RIDEAU","CHAISE","DOUCHE","AMUSER","ARBORE","CAHIER","CAMION","CARTON","CHATON","COQUET","CUISSE","DAGUET","DANSER","DEBOUT","DEVANT","DOMINO","DORURE","EMOUVE","FALAIS","FANION","FEERIE","FIABLE","FIGUES","GLOIRE","GRENAT","HAMEAU","HILARE","ILLICO","JARDON","JURONS","LACUNE","LEVIER","MAILLE","MANOIR","MARLOU","MATINS","MIRAGE","MODELE","MOUSSE","MUSEAU","NACELLE","NAITRE","NIVEAU","NODULE","NOUGAT","OBLIQUE","OEUVRE","OISEAU"];

// Sélection du mot du jour
const today = new Date();
const dayIndex = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
const WORD = WORDS[dayIndex % WORDS.length];
const WORD_LEN = WORD.length;
const MAX_TRIES = 6;

let currentRow = 0;
let currentCol = 1; // 0 is always given
let currentGuess = ['', ...Array(WORD_LEN - 1).fill('')];
currentGuess[0] = WORD[0];
let gameOver = false;
const keyState = {};

// Affiche date
const dateEl = document.getElementById('pill-date');
dateEl.textContent = '📅 ' + today.toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long'});

// Construire la grille
const grid = document.getElementById('grid');
const cells = [];
for (let r = 0; r < MAX_TRIES; r++) {
  const row = document.createElement('div');
  row.className = 'grid-row';
  const rowCells = [];
  for (let c = 0; c < WORD_LEN; c++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (c === 0 ? ' given' : '') + (r === 0 ? ' active-row' : '');
    if (c === 0) cell.textContent = WORD[0];
    row.appendChild(cell);
    rowCells.push(cell);
  }
  grid.appendChild(row);
  cells.push(rowCells);
}

// Clavier
const ROWS = [
  ['A','Z','E','R','T','Y','U','I','O','P'],
  ['Q','S','D','F','G','H','J','K','L','M'],
  ['ENTRÉE','W','X','C','V','B','N','⌫']
];
const keyboard = document.getElementById('keyboard');
ROWS.forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'kb-row';
  row.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'kb-key' + (k.length > 1 ? ' wide' : '');
    btn.textContent = k;
    btn.dataset.key = k;
    btn.addEventListener('click', () => handleKey(k));
    rowEl.appendChild(btn);
    if (k.length === 1) keyState[k] = { el: btn, state: 'unused' };
  });
  keyboard.appendChild(rowEl);
});

function handleKey(k) {
  if (gameOver) return;
  if (k === 'ENTRÉE') {
    submitGuess();
  } else if (k === '⌫') {
    deleteLetter();
  } else if (/^[A-Z]$/.test(k)) {
    addLetter(k);
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const key = e.key.toUpperCase();
  if (key === 'ENTER') handleKey('ENTRÉE');
  else if (key === 'BACKSPACE') handleKey('⌫');
  else if (/^[A-ZÉÈÊÀÙÛÎÔÇ]$/.test(key)) handleKey(normalize(key));
});

function normalize(k) {
  return k.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
}

function addLetter(l) {
  if (currentCol >= WORD_LEN) return;
  currentGuess[currentCol] = l;
  cells[currentRow][currentCol].textContent = l;
  cells[currentRow][currentCol].classList.add('filled');
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 1) return;
  currentCol--;
  currentGuess[currentCol] = '';
  cells[currentRow][currentCol].textContent = '';
  cells[currentRow][currentCol].classList.remove('filled');
}

function updateTriesPill() {
  document.getElementById('pill-tries').textContent = `🎯 ${MAX_TRIES - currentRow} essais restants`;
}

function submitGuess() {
  if (currentCol < WORD_LEN) { shake(); showToast('Le mot n\'est pas complet !'); return; }
  const guess = currentGuess.join('');

  // Calcul couleurs
  const result = Array(WORD_LEN).fill('absent');
  const wordArr = WORD.split('');
  const guessArr = guess.split('');
  const used = Array(WORD_LEN).fill(false);
  // Correct
  guessArr.forEach((l, i) => {
    if (l === wordArr[i]) { result[i] = 'correct'; used[i] = true; }
  });
  // Present
  guessArr.forEach((l, i) => {
    if (result[i] === 'correct') return;
    const idx = wordArr.findIndex((w, j) => w === l && !used[j]);
    if (idx !== -1) { result[i] = 'present'; used[idx] = true; }
  });

  // Animer cellules avec délai
  result.forEach((state, i) => {
    setTimeout(() => {
      const cell = cells[currentRow][i];
      cell.classList.remove('filled','active-row');
      cell.classList.add(state);
      // Clavier
      const kb = keyState[guess[i]];
      if (kb) {
        const priority = {correct:3,present:2,absent:1,unused:0};
        if (!kb.state || priority[state] > priority[kb.state]) {
          kb.state = state;
          kb.el.className = `kb-key${state ? ' ' + state : ''}`;
        }
      }
    }, i * 80);
  });

  const won = result.every(r => r === 'correct');
  const lastRow = currentRow === MAX_TRIES - 1;

  setTimeout(() => {
    currentRow++;
    currentCol = 1;
    currentGuess = [WORD[0], ...Array(WORD_LEN - 1).fill('')];

    if (won) {
      endGame(true);
    } else if (lastRow) {
      endGame(false);
    } else {
      // Activer nouvelle rangée
      cells[currentRow].forEach(c => c.classList.add('active-row'));
      cells[currentRow][0].textContent = WORD[0];
      cells[currentRow][0].classList.add('given');
      updateTriesPill();
    }
  }, WORD_LEN * 80 + 100);
}

function shake() {
  cells[currentRow].forEach(c => {
    c.classList.remove('shake');
    void c.offsetWidth;
    c.classList.add('shake');
  });
}

function endGame(won) {
  gameOver = true;
  const banner = document.getElementById('result');
  document.getElementById('res-icon').textContent = won ? '🎉' : '😢';
  document.getElementById('res-title').textContent = won
    ? ['Parfait !','Excellent !','Super !','Bien joué !','Pas mal !','Ouf !'][currentRow-1] || 'Bravo !'
    : 'Raté cette fois…';
  document.getElementById('res-word').innerHTML = won
    ? `Trouvé en <strong>${currentRow} essai${currentRow>1?'s':''}</strong> !`
    : `Le mot était <strong>${WORD}</strong>`;
  banner.classList.add('show');
  updateStats(won);
}

function updateStats(won) {
  const s = JSON.parse(localStorage.getItem('motsdoux-stats') || '{"played":0,"wins":0,"streak":0}');
  s.played++;
  if (won) { s.wins++; s.streak++; } else { s.streak = 0; }
  localStorage.setItem('motsdoux-stats', JSON.stringify(s));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

updateTriesPill();
</script>
</body>
</html>
