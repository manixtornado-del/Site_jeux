<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sutom ♡ Mots Doux</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>window.va = window.va || function(){(window.vaq = window.vaq || []).push(arguments)};</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#f7c5d5;--rose-d:#e8809e;
  --lavande:#d4c5f7;--lavande-d:#9b82e0;
  --menthe:#c5f0e0;--menthe-d:#5bc9a0;--menthe-l:#edfbf5;
  --jaune:#fde68a;--jaune-d:#d97706;
  --crème:#fef8f0;--beige:#f5ede0;
  --brun-d:#7a5c4a;--brun:#b08a72;
  --blanc:#ffffff;--texte:#4a3728;--texte-doux:#8a6d5e;
  --shadow:rgba(180,130,110,0.15);
  --nav-h:56px;
  --cell:52px;
}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:var(--crème);color:var(--texte);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 15%,rgba(247,197,213,.28) 0%,transparent 50%),radial-gradient(circle at 85% 85%,rgba(212,197,247,.22) 0%,transparent 50%);pointer-events:none;z-index:0}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(254,248,240,.92);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(180,130,110,.1);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.nav-logo{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;color:var(--texte);text-decoration:none;display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.nav-logo span{color:var(--rose-d)}
.nav-center{display:flex;gap:.3rem;list-style:none;flex:1;justify-content:center}
.nav-center a{text-decoration:none;font-size:.8rem;font-weight:600;color:var(--texte-doux);padding:.3rem .65rem;border-radius:100px;transition:background .15s,color .15s;border:1.5px solid transparent;white-space:nowrap}
.nav-center a:hover{background:var(--beige);color:var(--texte)}
.nav-center a.active{background:var(--blanc);color:var(--texte);border-color:rgba(180,130,110,.2);box-shadow:0 2px 8px var(--shadow)}
.nav-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.lang-toggle{display:flex;background:var(--beige);border-radius:100px;padding:3px;gap:2px;border:1.5px solid rgba(180,130,110,.15)}
.lang-btn{border:none;background:transparent;border-radius:100px;padding:.25rem .6rem;font-family:'Quicksand',sans-serif;font-size:.75rem;font-weight:700;color:var(--texte-doux);cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--blanc);color:var(--texte);box-shadow:0 1px 4px var(--shadow)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--texte);border-radius:2px;transition:transform .25s,opacity .2s;margin:4px 0}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-drawer{display:none;position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;background:rgba(254,248,240,.98);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(180,130,110,.12);padding:1rem;flex-direction:column;gap:.35rem;animation:drawerIn .2s ease}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mobile-drawer.open{display:flex}
.mobile-drawer a{text-decoration:none;font-size:.95rem;font-weight:600;color:var(--texte-doux);padding:.6rem 1rem;border-radius:12px;transition:background .15s}
.mobile-drawer a:hover,.mobile-drawer a.active{background:var(--beige);color:var(--texte)}
.drawer-lang{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem}

/* PAGE */
.page{position:relative;z-index:10;max-width:520px;margin:0 auto;padding:1.25rem 1rem 3rem}
.page-header{text-align:center;margin-bottom:1.2rem}
.page-icon{width:58px;height:58px;border-radius:50%;background:var(--blanc);display:inline-flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 4px 16px var(--shadow),0 0 0 5px rgba(247,197,213,.3);margin-bottom:.6rem;animation:bobble 3s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
.page-title{font-family:'Nunito',sans-serif;font-size:1.75rem;font-weight:800}
.page-sub{font-size:.85rem;color:var(--texte-doux);margin-top:.25rem;font-weight:500}
.info-row{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.25rem}
.info-pill{background:var(--blanc);border-radius:100px;padding:.28rem .8rem;font-size:.74rem;font-weight:600;color:var(--texte-doux);box-shadow:0 2px 8px var(--shadow);border:1.5px solid rgba(180,130,110,.1)}

/* LEGEND */
.legend{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.2rem}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.74rem;font-weight:600;color:var(--texte-doux)}
.legend-dot{width:16px;height:16px;border-radius:5px;flex-shrink:0}

/* GRID */
.grid-wrap{display:flex;flex-direction:column;gap:.4rem;align-items:center;margin-bottom:1.25rem}
.grid-row{display:flex;gap:.4rem}
.cell{
  width:var(--cell);height:var(--cell);
  border-radius:13px;border:2px solid rgba(180,130,110,.2);
  background:var(--blanc);display:flex;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;font-size:1.35rem;font-weight:800;color:var(--texte);
  transition:border-color .15s,transform .1s;user-select:none;position:relative;
}
.cell.active-row{border-color:rgba(180,130,110,.42)}
.cell.filled{border-color:var(--rose-d);animation:pop .15s ease}
@keyframes pop{0%{transform:scale(1.1)}100%{transform:scale(1)}}
.cell.correct{background:var(--menthe-d);border-color:var(--menthe-d);color:#fff;animation:flip .4s ease forwards}
.cell.present{background:var(--jaune);border-color:var(--jaune-d);color:var(--texte);animation:flip .4s ease forwards}
.cell.absent{background:#c9b5a8;border-color:#c9b5a8;color:#fff;animation:flip .4s ease forwards}
.cell.given{background:var(--rose);border-color:var(--rose-d);color:var(--texte)}
@keyframes flip{0%{transform:scaleY(1)}50%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.cell.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}

/* KEYBOARD */
.keyboard{display:flex;flex-direction:column;gap:.38rem;align-items:center;margin-bottom:1.25rem}
.kb-row{display:flex;gap:.3rem;justify-content:center}
.kb-key{min-width:var(--cell-kb,32px);height:44px;padding:0 .4rem;border-radius:9px;border:none;background:var(--blanc);color:var(--texte);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;box-shadow:0 2px 6px var(--shadow);transition:transform .1s,background .15s;display:flex;align-items:center;justify-content:center}
.kb-key:hover{transform:scale(1.06);background:var(--beige)}
.kb-key:active{transform:scale(.94)}
.kb-key.wide{min-width:50px;font-size:.72rem}
.kb-key.correct{background:var(--menthe-d);color:#fff}
.kb-key.present{background:var(--jaune);color:var(--texte)}
.kb-key.absent{background:#c9b5a8;color:#fff}

/* RESULT */
.result-banner{display:none;text-align:center;background:var(--blanc);border-radius:18px;padding:1.4rem 1.2rem;box-shadow:0 4px 20px var(--shadow);border:1.5px solid rgba(180,130,110,.12);margin-bottom:1rem}
.result-banner.show{display:block;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.result-icon{font-size:2.3rem;margin-bottom:.45rem}
.result-title{font-family:'Nunito',sans-serif;font-size:1.35rem;font-weight:800;margin-bottom:.3rem}
.result-word{color:var(--texte-doux);font-size:.88rem;margin-bottom:1rem}
.result-btns{display:flex;gap:.55rem;justify-content:center;flex-wrap:wrap}
.result-btns a{text-decoration:none}
.btn{background:var(--texte);color:var(--blanc);border:none;border-radius:100px;padding:.5rem 1.2rem;font-family:'Quicksand',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;display:inline-flex;align-items:center;gap:.3rem}
.btn:hover{background:var(--brun-d);transform:scale(1.03)}
.btn-outline{background:transparent;color:var(--texte-doux);border:1.5px solid rgba(180,130,110,.3)}
.btn-outline:hover{background:var(--beige)}

/* SCORE INPUT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,55,40,.35);z-index:200;backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--blanc);border-radius:22px;max-width:360px;width:100%;padding:1.75rem;box-shadow:0 20px 50px rgba(74,55,40,.25);animation:popIn .35s cubic-bezier(.34,1.56,.64,1);text-align:center}
.modal-icon{font-size:2.2rem;margin-bottom:.5rem}
.modal-title{font-family:'Nunito',sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:.35rem}
.modal-sub{color:var(--texte-doux);font-size:.85rem;margin-bottom:1rem;line-height:1.5}
.modal-input{width:100%;height:46px;border-radius:12px;border:2px solid rgba(180,130,110,.25);background:var(--beige);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--texte);padding:0 1rem;outline:none;margin-bottom:.75rem;transition:border-color .15s}
.modal-input:focus{border-color:var(--rose-d)}
.modal-btns{display:flex;gap:.5rem;flex-direction:column}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--texte);color:var(--blanc);padding:.65rem 1.3rem;border-radius:100px;font-weight:600;font-size:.88rem;z-index:300;opacity:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* RESPONSIVE */
@media(max-width:600px){
  .nav-center{display:none}
  .hamburger{display:block}
  :root{--cell:44px}
  .kb-key{min-width:28px;height:40px;font-size:.78rem}
  .kb-key.wide{min-width:44px}
  .page{padding:1rem .75rem 3rem}
}
@media(min-width:601px){
  .hamburger{display:none}
  .mobile-drawer{display:none !important}
}
@media(max-width:360px){
  :root{--cell:40px}
  .kb-key{min-width:24px;height:38px;font-size:.72rem}
  .kb-key.wide{min-width:40px}
}

/* LANG PICKER MODAL */
.lang-modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,55,40,.45);z-index:500;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
.lang-modal-overlay.open{display:flex}
.lang-modal{background:var(--blanc);border-radius:26px;max-width:340px;width:100%;padding:2rem 1.75rem 1.75rem;box-shadow:0 24px 60px rgba(74,55,40,.28);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);text-align:center}
.lang-modal-icon{font-size:2.6rem;margin-bottom:.6rem}
.lang-modal-title{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:.3rem;color:var(--texte)}
.lang-modal-sub{font-size:.84rem;color:var(--texte-doux);font-weight:500;margin-bottom:1.5rem;line-height:1.5}
.lang-choices{display:flex;gap:.75rem;justify-content:center}
.lang-choice{flex:1;border:2.5px solid rgba(180,130,110,.2);border-radius:18px;padding:1rem .75rem;cursor:pointer;background:var(--blanc);transition:border-color .18s,transform .18s,box-shadow .18s;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.lang-choice:hover{border-color:var(--rose-d);transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow)}
.lang-choice-flag{font-size:2rem;line-height:1}
.lang-choice-name{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:var(--texte)}
.lang-choice-sub{font-size:.72rem;color:var(--texte-doux);font-weight:500}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">🌸 Mots <span>Doux</span></a>
  <ul class="nav-center">
    <li><a href="index.html" data-i18n="home"></a></li>
    <li><a href="sutom.html" class="active" data-i18n="sutom_nav"></a></li>
    <li><a href="wiki.html" data-i18n="wiki_nav"></a></li>
  </ul>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-drawer" id="mobile-drawer">
  <a href="index.html" data-i18n="home"></a>
  <a href="sutom.html" class="active" data-i18n="sutom_nav"></a>
  <a href="wiki.html" data-i18n="wiki_nav"></a>
  <div class="drawer-lang">
    <span style="font-size:.82rem;color:var(--texte-doux);font-weight:600">🌍</span>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <div class="page-icon">🔤</div>
    <h1 class="page-title" data-i18n="title"></h1>
    <p class="page-sub" data-i18n="subtitle"></p>
  </div>
  <div class="info-row">
    <span class="info-pill" id="pill-date"></span>
    <span class="info-pill" id="pill-tries"></span>
    <span class="info-pill" data-i18n="letters_6"></span>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:var(--menthe-d)"></span><span data-i18n="legend_correct"></span></div>
    <div class="legend-item"><span class="legend-dot" style="background:var(--jaune)"></span><span data-i18n="legend_present"></span></div>
    <div class="legend-item"><span class="legend-dot" style="background:#c9b5a8"></span><span data-i18n="legend_absent"></span></div>
  </div>
  <div class="grid-wrap" id="grid"></div>
  <div class="result-banner" id="result">
    <div class="result-icon" id="res-icon">🎉</div>
    <div class="result-title" id="res-title"></div>
    <div class="result-word" id="res-word"></div>
    <div class="result-btns">
      <a href="wiki.html" class="btn" data-i18n-href="wiki" id="btn-wiki"></a>
      <a href="index.html" class="btn btn-outline" data-i18n="back_home"></a>
    </div>
  </div>
  <div class="keyboard" id="keyboard"></div>
</div>

<!-- Score modal -->
<div class="modal-overlay" id="score-modal">
  <div class="modal">
    <div class="modal-icon">🏆</div>
    <div class="modal-title" data-i18n="modal_title"></div>
    <div class="modal-sub" data-i18n="modal_sub"></div>
    <input class="modal-input" id="score-name" type="text" maxlength="20" autocomplete="off" />
    <div class="modal-btns">
      <button class="btn" onclick="submitScore()" data-i18n="modal_submit"></button>
      <button class="btn btn-outline" onclick="skipScore()" data-i18n="modal_skip"></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Lang picker modal -->
<div class="lang-modal-overlay" id="lang-modal">
  <div class="lang-modal">
    <div class="lang-modal-icon">🌍</div>
    <div class="lang-modal-title">Choisissez votre langue</div>
    <div class="lang-modal-sub">Choose your language · Vous pourrez changer à tout moment</div>
    <div class="lang-choices">
      <button class="lang-choice" onclick="pickLang('fr')">
        <span class="lang-choice-flag">🇫🇷</span>
        <span class="lang-choice-name">Français</span>
        <span class="lang-choice-sub">Mots français</span>
      </button>
      <button class="lang-choice" onclick="pickLang('en')">
        <span class="lang-choice-flag">🇬🇧</span>
        <span class="lang-choice-name">English</span>
        <span class="lang-choice-sub">English words</span>
      </button>
    </div>
  </div>
</div>
<script>
// I18N
const T={
  fr:{home:"Accueil",sutom_nav:"🔤 Sutom",wiki_nav:"📖 Wikipédia",
    title:"Sutom",subtitle:"Trouve le mot du jour en 6 essais ✨",
    letters_6:"🔤 6 lettres",
    legend_correct:"Bonne place",legend_present:"Mauvaise place",legend_absent:"Absent",
    btn_wiki:"📖 Jouer à Wikipédia",back_home:"🏠 Accueil",
    modal_title:"Ton score !",modal_sub:"Entre ton pseudo pour apparaître dans le leaderboard 🏆",
    modal_ph:"Ton pseudo…",modal_submit:"Enregistrer 🎉",modal_skip:"Non merci",
    not_complete:"Le mot n'est pas complet !",
    not_word:"Mot inconnu du dictionnaire 📖",
    checking:"Vérification…",
    wins:["Parfait !","Excellent !","Super !","Bien joué !","Pas mal !","Ouf !"],
    lose:"Raté cette fois…",
  },
  en:{home:"Home",sutom_nav:"🔤 Sutom",wiki_nav:"📖 Wikipedia",
    title:"Sutom",subtitle:"Find the word of the day in 6 tries ✨",
    letters_6:"🔤 6 letters",
    legend_correct:"Right spot",legend_present:"Wrong spot",legend_absent:"Absent",
    btn_wiki:"📖 Play Wikipedia",back_home:"🏠 Home",
    modal_title:"Your score!",modal_sub:"Enter your name to appear on the leaderboard 🏆",
    modal_ph:"Your name…",modal_submit:"Save 🎉",modal_skip:"No thanks",
    not_complete:"Word is not complete!",
    not_word:"Unknown word 📖",
    checking:"Checking…",
    wins:["Perfect!","Excellent!","Great!","Well done!","Not bad!","Phew!"],
    lose:"Better luck next time…",
  }
};
let lang=localStorage.getItem('md-lang')||(navigator.language.startsWith('en')?'en':'fr');
function t(k){return(T[lang]&&T[lang][k])||(T.fr[k])||k}
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
  document.getElementById('score-name').placeholder=t('modal_ph');
  const locale=lang==='en'?'en-US':'fr-FR';
  document.getElementById('pill-date').textContent='📅 '+new Date().toLocaleDateString(locale,{weekday:'long',day:'numeric',month:'long'});
  updateTriesPill();
}
function setLang(l){if(l===lang)return;localStorage.setItem('md-lang',l);location.reload();}

// GAME
const WORDS_FR=["MAISON","JARDIN","SOLEIL","MOUTON","CANARD","PIERRE","ARBRES","BALCON","BEAUTE","MANGER","DORMIR","FACILE","RAPIDE","HERBES","CHEMIN","NUAGES","FLEURS","CHARME","BRAISE","SAVOIR","VALISE","MIROIR","DESERT","VOYAGE","PAROLE","NATURE","PLUMES","CANAPE","BUREAU","MARCHE","BATEAU","AVENIR","BOUGIE","CHAUDE","FROIDE","CHEVRE","LIERRE","MENTHE","ORANGE","CERISE","BANANE","MANGUE","CASQUE","FLECHE","NUANCE","TRUITE","SAUMON","JARRES","BOUTON","CRAYON","CAHIER","RIDEAU","CHAISE","DOUCHE","AMUSER","CAMION","CARTON","CHATON","COQUET","DANSER","DEBOUT","DEVANT","DOMINO","FANION","FIABLE","GLOIRE","GRENAT","HILARE","JURONS","LACUNE","LEVIER","MAILLE","MANOIR","MIRAGE","MODELE","MOUSSE","MUSEAU","NAITRE","NIVEAU","NODULE","NOUGAT","OEUVRE","OISEAU"];
const WORDS_EN=["CHAIR","DREAM","FLAME","GRACE","HEART","IVORY","JEWEL","KNIFE","LEMON","MAPLE","NIGHT","OLIVE","PEARL","QUEEN","RIVER","STORM","TIGER","VIOLA","WATER","APPLE","BLAZE","CRANE","DANCE","EAGLE","FAIRY","GLOBE","HASTE","JAZZY","KNACK","LIGHT","MIRTH","NYMPH","OAKEN","PRISM","QUEST","ROBIN","SWORD","THORN","UMBRA","VENOM","WITCH","AXIOM","BRAVE","CELLO","DWARF","EMBER","FROST","GRAIL","HERON","JOUST","KARMA","LUSTY","MAGIC","NOBLE","OTTER","PLUME","QUOTE","RAVEN","SPIRE","TALON","UNITE","VAGUE","BLOOM","CLOAK","DINGO","ENVOY","FLAIR","HAZEL","IRONY","JELLY","KAYAK","SCAPE","TROVE","GLOOM","PLAID","SHAWL","PIXEL","OXIDE","BLUNT","CRISP","TRYST"];
const today=new Date();
const dayIdx=Math.floor((today-new Date(today.getFullYear(),0,0))/86400000);
const WORDS=lang==='en'?WORDS_EN:WORDS_FR;
const WORD=WORDS[dayIdx%WORDS.length];
const WORD_LEN=WORD.length, MAX=6;
let curRow=0,curCol=1,curGuess=[WORD[0],...Array(WORD_LEN-1).fill('')],gameOver=false;
const keyState={};
let pendingScore=0;

// SAVE / RESTORE STATE
const SAVE_KEY=`sutom-state-${today.toISOString().slice(0,10)}-${lang}`;
function saveState(){
  const rows=cells.map(row=>row.map(c=>({text:c.textContent,cls:[...c.classList].filter(x=>['correct','present','absent','filled','given'].includes(x))})));
  localStorage.setItem(SAVE_KEY,JSON.stringify({curRow,curCol,curGuess,gameOver,rows,keyState:Object.fromEntries(Object.entries(keyState).map(([k,v])=>[k,v.state]))}));
}
function clearOldStates(){
  for(const k of Object.keys(localStorage)){
    if(k.startsWith('sutom-state-')&&k!==SAVE_KEY) localStorage.removeItem(k);
  }
}

function updateTriesPill(){
  const n=MAX-curRow;
  document.getElementById('pill-tries').textContent=
    lang==='en'?`🎯 ${n} tr${n>1?'ies':'y'} left`:`🎯 ${n} essai${n>1?'s':''} restant${n>1?'s':''}`;
}

// Build grid
const grid=document.getElementById('grid');
const cells=[];
for(let r=0;r<MAX;r++){
  const row=document.createElement('div'); row.className='grid-row';
  const rc=[];
  for(let c=0;c<WORD_LEN;c++){
    const cell=document.createElement('div');
    cell.className='cell'+(c===0?' given':'')+(r===0?' active-row':'');
    if(c===0)cell.textContent=WORD[0];
    row.appendChild(cell); rc.push(cell);
  }
  grid.appendChild(row); cells.push(rc);
}

// Build keyboard
const ROWS=[['A','Z','E','R','T','Y','U','I','O','P'],['Q','S','D','F','G','H','J','K','L','M'],['OK','W','X','C','V','B','N','⌫']];
const kb=document.getElementById('keyboard');
ROWS.forEach(row=>{
  const rowEl=document.createElement('div'); rowEl.className='kb-row';
  row.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='kb-key'+(k.length>1?' wide':'');
    btn.textContent=k; btn.dataset.key=k;
    btn.addEventListener('click',()=>handleKey(k));
    rowEl.appendChild(btn);
    if(k.length===1) keyState[k]={el:btn,state:'unused'};
  });
  kb.appendChild(rowEl);
});

// RESTORE SAVED STATE
(function restoreState(){
  clearOldStates();
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  try{
    const s=JSON.parse(raw);
    curRow=s.curRow; curCol=s.curCol; curGuess=s.curGuess; gameOver=s.gameOver;
    s.rows.forEach((row,r)=>row.forEach((cd,c)=>{
      const cell=cells[r][c];
      cell.textContent=cd.text;
      cell.className='cell';
      cd.cls.forEach(cl=>cell.classList.add(cl));
    }));
    if(!gameOver){
      cells[curRow].forEach(c=>c.classList.add('active-row'));
    }
    Object.entries(s.keyState||{}).forEach(([k,state])=>{
      if(keyState[k]&&state!=='unused'){
        keyState[k].state=state;
        keyState[k].el.className=`kb-key ${state}`;
      }
    });
    if(gameOver) restoreResultBanner();
  }catch(e){localStorage.removeItem(SAVE_KEY)}
})();

function restoreResultBanner(){
  // Récupère les stats pour retrouver won/curRow depuis l'état sauvé
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw) return;
  const s=JSON.parse(raw);
  // Si toutes les cellules de la dernière ligne jouée sont 'correct' => won
  const lastPlayedRow=s.curRow-1;
  if(lastPlayedRow<0) return;
  const won=lastPlayedRow>=0&&s.rows[lastPlayedRow].every(cd=>cd.cls.includes('correct'));
  const rowsPlayed=s.curRow;
  document.getElementById('res-icon').textContent=won?'🎉':'😢';
  document.getElementById('res-title').textContent=won?(T[lang].wins[rowsPlayed-1]||T[lang].wins[5]):t('lose');
  document.getElementById('res-word').innerHTML=won
    ?`${lang==='en'?`Found in <strong>${rowsPlayed} tr${rowsPlayed>1?'ies':'y'}</strong>!`:`Trouvé en <strong>${rowsPlayed} essai${rowsPlayed>1?'s':''}</strong> !`}`
    :`${lang==='en'?`The word was`:'Le mot était'} <strong>${WORD}</strong>`;
  document.getElementById('result').classList.add('show');
}

let checking=false;
function handleKey(k){
  if(gameOver||checking)return;
  if(k==='OK'||k==='ENTRÉE'){checking=true;submitGuess().finally(()=>{checking=false;});}
  else if(k==='⌫')deleteLetter();
  else if(/^[A-Z]$/.test(k))addLetter(k);
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const k=e.key.toUpperCase();
  if(k==='ENTER')handleKey('OK');
  else if(k==='BACKSPACE')handleKey('⌫');
  else if(/^[A-ZÉÈÊÀÙÛÎÔÇ]$/.test(k))handleKey(norm1(k));
});
function norm1(k){return k.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase()}
function addLetter(l){if(curCol>=WORD_LEN)return;curGuess[curCol]=l;cells[curRow][curCol].textContent=l;cells[curRow][curCol].classList.add('filled');curCol++;saveState()}
function deleteLetter(){if(curCol<=1)return;curCol--;curGuess[curCol]='';cells[curRow][curCol].textContent='';cells[curRow][curCol].classList.remove('filled');saveState()}
// DICTIONARY CHECK
// Wordlist FR 6 lettres (mots valides pour Sutom)
const VALID_FR=new Set("MAISON,JARDIN,SOLEIL,MOUTON,CANARD,PIERRE,ARBRES,BALCON,BEAUTE,MANGER,DORMIR,FACILE,RAPIDE,HERBES,CHEMIN,NUAGES,FLEURS,CHARME,BRAISE,SAVOIR,VALISE,MIROIR,DESERT,VOYAGE,PAROLE,NATURE,PLUMES,CANAPE,BUREAU,MARCHE,BATEAU,AVENIR,BOUGIE,CHAUDE,FROIDE,CHEVRE,LIERRE,MENTHE,ORANGE,CERISE,BANANE,MANGUE,CASQUE,FLECHE,NUANCE,TRUITE,SAUMON,JARRES,BOUTON,CRAYON,CAHIER,RIDEAU,CHAISE,DOUCHE,AMUSER,CAMION,CARTON,CHATON,COQUET,DANSER,DEBOUT,DEVANT,DOMINO,FANION,FIABLE,GLOIRE,GRENAT,HILARE,JURONS,LACUNE,LEVIER,MAILLE,MANOIR,MIRAGE,MODELE,MOUSSE,MUSEAU,NAITRE,NIVEAU,NODULE,NOUGAT,OEUVRE,OISEAU,ABIMER,ABSENT,ABSOLU,ABUSER,ACCUSE,ACHEVE,ACTIVE,ADAPTE,ADMIRE,ADOPTE,ADULTE,AFFAME,AGENCE,AGITER,AIGLON,AIMANT,ALERTE,ALIGNE,ALLIER,ALPAGE,AMANDE,AMARRE,AMENDE,AMIDON,AMITIE,AMORCE,ANCIEN,ANGINE,ANNEAU,APERCU,APLOMB,APPRIS,ARDEUR,ARGENT,ARMURE,ARRETE,ARRIVE,ARTERE,ASPECT,ASTUCE,ATTIRE,AUDACE,AUGURE,AURORE,AUTEUR,AUTRES,AVALEE,AVANCE,AVOINE,BAILEE,BAISER,BANDER,BANNIE,BARQUE,BARRER,BASSIN,BEDEAU,BELOTE,BERGER,BLAGUE,BLESSE,BLOTTI,BOISEE,BONNET,BOSSUE,BOTTER,BOUCHE,BOUDER,BOUEUX,BOUGON,BOULET,BOURRE,BOUTER,BRAVER,BRETON,BRIQUE,BRISER,BRODER,BRULER,BRUNIR,CADEAU,CAISSE,CALMER,CAMPER,CANINE,CARAFE,CARNET,CAUSSE,CENDRE,CERTES,CESSER,CHALET,CHAQUE,CHARGE,CHARTE,CHAUME,CLAMER,CLARTE,CLOCHE,COGNER,COLERE,COLLET,COLLER,COMBAT,COMBLE,COMMUN,COPIER,CORDON,CORNER,COUARD,COUDRE,COULEE,COUPER,COURIR,CRACHE,CREVER,CROIRE,CROUPE,CUISSE,DAMNER,DAUBER,DEBILE,DECALE,DECENT,DECIDE,DEDAIN,DEFAUT,DEGOUT,DEHORS,DELIRE,DEMENT,DENOTE,DEPLIE,DEPUIS,DERIVE,DESOLE,DIABLE,DINDON,DOLMEN,DONJON,DOSEUR,DOUBLE,DOUTER,DROITE,EFFACE,ELEVER,EMERGE,EMIRAT,EMPIRE,ENFANT,ENLEVE,ENNEMI,ENTIER,ENTRER,ENVERS,EPOQUE,ERRANT,ESPOIR,ETALER,ETROIT,EVADER,EVOLUE,EXAMEN,EXCITE,EXEMPT,EXPOSE,FACHER,FAIBLE,FAMEUX,FAMINE,FARCES,FATALE,FAVEUR,FENDRE,FERMER,FEROCE,FEUTRE,FIASCO,FIGURE,FLAMME,FLANER,FLAQUE,FLECHI,FLUIDE,FORCER,FORGER,FOUDRE,FOURBE,FOURMI,FRACAS,FRAISE,FRAYER,FRISEE,FRONDE,FUREUR,FUTURE,GAGNER,GALERE,GARDER,GATEAU,GAUCHE,GENDRE,GERBER,GLANER,GLISSE,GONFLE,GORGER,GOUTER,GRUGER,GUIDER,HASARD,HISSER,HUMOUR,IMITER,IMPOSE,INEPTE,IRONIE,JARRET,JETONS,JOVIAL,JOUEUR,LANCER,LANGUE,LARDER,LARGUE,LASSER,LATENT,LAVOIR,LEGERE,LESTER,LEURRE,LIVRER,LOUCHE,MAIGRE,MALICE,MANQUE,MARTYR,MASTIC,MAUDIT,MERITE,METTRE,MIETTE,MODERE,MOMENT,MONTRE,MORDRE,MOTEUR,MOUCHE,MOURIR,MUNIES,MUSARD,NATTES,NAVIRE,NEUTRE,NICHER,NOMMER,NORMES,NOURRI,OBTENU,OFFRIR,OPAQUE,OPPOSE,ORGANE,OUBLIE,PALIER,PARDON,PATRIE,PATRON,PENSER,PERCER,PERDRE,PERMET,PETITE,PHRASE,PIOCHE,PIQUER,PLACER,PLAIRE,PLANER,PLAQUE,PLONGE,PLUTOT,POCHER,POLLEN,PORTER,POTION,POURRI,PREUVE,PRIMER,PRISON,PROPOS,RENARD,RENDRE,REFUGE,RELIER,RETARD,RETENU,REVELE,RISQUE,RONDEUR,RONGER,ROULER,RUSTRE,SABLER,SALUER,SAUTER,SAVEUR,SEDUIRE,SEMBLER,SERMON,SERRER,SIGNAL,SIROTE,SOLDAT,SOMBRE,SONGER,SORTIR,SOURIRE,SUISSE,TACHER,TAILLE,TAMPON,TARDER,TEINTE,TENDRE,TENDUE,TIMIDE,TOLERE,TOMBER,TONNER,TOUCHE,TRAITS,TRESOR,TRESSE,TRISTE,TROUBLE,TROUVER,ULTIME,VALEUR,VANTER,VENTRE,VERSER,VILAIN,VIVANT,VOLEUR,VRILLE,ZAPPER".split(","));

const dictCache={};
async function checkWord(word,l){
  // Normalise: uppercase, strip accents
  const w=word.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const key=l+':'+w;
  if(key in dictCache) return dictCache[key];
  try{
    let ok=false;
    if(l==='fr'){
      // 1. Check embedded wordlist first (instant, no network)
      if(VALID_FR.has(w)){ ok=true; }
      else {
        // 2. Fallback: MediaWiki API (supports CORS via origin=*)
        const r=await fetch(`https://fr.wiktionary.org/w/api.php?action=query&titles=${encodeURIComponent(word.toLowerCase())}&format=json&origin=*`);
        const d=await r.json();
        const pages=d.query.pages;
        ok=!Object.keys(pages).includes('-1');
      }
    } else {
      // English: Free Dictionary API
      const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
      ok=r.ok;
    }
    dictCache[key]=ok;
    return ok;
  }catch(e){
    return true; // fail open if network error
  }
}

async function submitGuess(){
  if(curCol<WORD_LEN){shake();showToast(t('not_complete'));return}
  const guess=curGuess.join('');
  // Check word exists in dictionary
  showToast(t('checking'));
  const known=await checkWord(guess,lang);
  if(!known){shake();showToast(t('not_word'));return}
  const result=Array(WORD_LEN).fill('absent');
  const wa=WORD.split(''),ga=guess.split(''),used=Array(WORD_LEN).fill(false);
  ga.forEach((l,i)=>{if(l===wa[i]){result[i]='correct';used[i]=true}});
  ga.forEach((l,i)=>{if(result[i]==='correct')return;const idx=wa.findIndex((w,j)=>w===l&&!used[j]);if(idx!==-1){result[i]='present';used[idx]=true}});
  result.forEach((state,i)=>{
    setTimeout(()=>{
      const cell=cells[curRow][i];
      cell.classList.remove('filled','active-row');
      cell.classList.add(state);
      const kb=keyState[guess[i]];
      if(kb){const p={correct:3,present:2,absent:1,unused:0};if(p[state]>(p[kb.state]||0)){kb.state=state;kb.el.className=`kb-key${kb.el.className.includes('wide')?' wide':''} ${state}`}}
    },i*80);
  });
  const won=result.every(r=>r==='correct'),last=curRow===MAX-1;
  setTimeout(()=>{
    curRow++;curCol=1;curGuess=[WORD[0],...Array(WORD_LEN-1).fill('')];
    if(won)endGame(true);
    else if(last)endGame(false);
    else{cells[curRow].forEach(c=>c.classList.add('active-row'));cells[curRow][0].textContent=WORD[0];cells[curRow][0].classList.add('given');updateTriesPill();saveState()}
  },WORD_LEN*80+100);
}
function shake(){cells[curRow].forEach(c=>{c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake')})}

function endGame(won){
  gameOver=true;
  saveState();
  const score=won?Math.max(100,[1000,900,800,600,400,200][curRow-1]||200):0;
  pendingScore=score;
  document.getElementById('res-icon').textContent=won?'🎉':'😢';
  document.getElementById('res-title').textContent=won?(T[lang].wins[curRow-1]||T[lang].wins[5]):t('lose');
  document.getElementById('res-word').innerHTML=won
    ?`${lang==='en'?`Found in <strong>${curRow} tr${curRow>1?'ies':'y'}</strong>!`:`Trouvé en <strong>${curRow} essai${curRow>1?'s':''}</strong> !`}`
    :`${lang==='en'?`The word was`:'Le mot était'} <strong>${WORD}</strong>`;
  document.getElementById('result').classList.add('show');
  const s=JSON.parse(localStorage.getItem('motsdoux-stats')||'{"played":0,"wins":0,"streak":0}');
  s.played++;if(won){s.wins++;s.streak++}else s.streak=0;
  localStorage.setItem('motsdoux-stats',JSON.stringify(s));
  if(won) setTimeout(()=>openScoreModal(),600);
}

// SCORE MODAL
function openScoreModal(){
  const savedName=localStorage.getItem('md-name')||'';
  document.getElementById('score-name').value=savedName;
  document.getElementById('score-modal').classList.add('open');
}
async function submitScore(){
  const name=(document.getElementById('score-name').value.trim()||(lang==='en'?'Anonymous':'Anonyme')).slice(0,20);
  localStorage.setItem('md-name',name);
  document.getElementById('score-modal').classList.remove('open');
  // Fallback local storage leaderboard
  const today=new Date().toISOString().slice(0,10);
  const lbKey=`lb:${today}`;
  let scores=[];
  try{const r=localStorage.getItem(lbKey);if(r)scores=JSON.parse(r)}catch(e){}
  const normName=s=>s.toLowerCase().trim();
  const idx=scores.findIndex(s=>normName(s.name)===normName(name)&&s.game==='Sutom');
  const entry={name,score:pendingScore,game:'Sutom',ts:Date.now()};
  if(idx>=0){if(pendingScore>scores[idx].score)scores[idx]=entry;}else scores.push(entry);
  localStorage.setItem(lbKey,JSON.stringify(scores));
  // Try remote API (Vercel + Upstash)
  try{
    const res=await fetch('/api/leaderboard',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,score:pendingScore,game:'Sutom'})
    });
    const data=await res.json();
    if(!res.ok) throw new Error(data.error||'Erreur');
  }catch(e){/* API not available, local score saved */}
  showToast(lang==='en'?'Score saved! 🏆':'Score enregistré ! 🏆');
}
function skipScore(){document.getElementById('score-modal').classList.remove('open')}
document.getElementById('score-name').addEventListener('keydown',e=>{if(e.key==='Enter')submitScore()});

// NAV
function toggleMenu(forceClose){
  const d=document.getElementById('mobile-drawer'),h=document.getElementById('hamburger');
  const open=forceClose?false:!d.classList.contains('open');
  d.classList.toggle('open',open);h.classList.toggle('open',open);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.nav')&&!e.target.closest('.mobile-drawer'))toggleMenu(true);
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

applyLang();

// LANG PICKER — shown only on first visit (no md-lang saved yet)
function pickLang(l){
  document.getElementById('lang-modal').classList.remove('open');
  setLang(l);
}
if(!localStorage.getItem('md-lang')){
  document.getElementById('lang-modal').classList.add('open');
}
