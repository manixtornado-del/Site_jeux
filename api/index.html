<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mots Doux ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>window.va = window.va || function(){(window.vaq = window.vaq || []).push(arguments)};</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rose:#f7c5d5;--rose-d:#e8809e;
  --lavande:#d4c5f7;--lavande-d:#9b82e0;
  --menthe:#c5f0e0;--menthe-d:#5bc9a0;
  --pêche:#fbd5b5;--pêche-d:#f09460;
  --crème:#fef8f0;--beige:#f5ede0;
  --brun-d:#7a5c4a;--brun:#b08a72;
  --blanc:#ffffff;--texte:#4a3728;--texte-doux:#8a6d5e;
  --shadow:rgba(180,130,110,0.15);
  --nav-h:56px;
}
html{scroll-behavior:smooth}
body{font-family:'Quicksand',sans-serif;background:var(--crème);color:var(--texte);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 20%,rgba(247,197,213,.3) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(212,197,247,.25) 0%,transparent 50%),radial-gradient(circle at 60% 10%,rgba(197,240,224,.2) 0%,transparent 40%);pointer-events:none;z-index:0}
.floaties{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.floatie{position:absolute;border-radius:50%;opacity:.12;animation:floatBubble linear infinite}
@keyframes floatBubble{0%{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.12}90%{opacity:.12}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:var(--nav-h);background:rgba(254,248,240,.92);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(180,130,110,.1);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.nav-logo{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;color:var(--texte);text-decoration:none;display:flex;align-items:center;gap:.35rem;flex-shrink:0}
.nav-logo span{color:var(--rose-d)}
.nav-center{display:flex;gap:.3rem;list-style:none;flex:1;justify-content:center}
.nav-center a{text-decoration:none;font-size:.8rem;font-weight:600;color:var(--texte-doux);padding:.3rem .65rem;border-radius:100px;transition:background .15s,color .15s;border:1.5px solid transparent;white-space:nowrap}
.nav-center a:hover{background:var(--beige);color:var(--texte)}
.nav-center a.active{background:var(--blanc);color:var(--texte);border-color:rgba(180,130,110,.2);box-shadow:0 2px 8px var(--shadow)}
.nav-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.lang-toggle{display:flex;background:var(--beige);border-radius:100px;padding:3px;gap:2px;border:1.5px solid rgba(180,130,110,.15)}
.lang-btn{border:none;background:transparent;border-radius:100px;padding:.25rem .6rem;font-family:'Quicksand',sans-serif;font-size:.75rem;font-weight:700;color:var(--texte-doux);cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--blanc);color:var(--texte);box-shadow:0 1px 4px var(--shadow)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px}
.hamburger span{display:block;width:22px;height:2px;background:var(--texte);border-radius:2px;transition:transform .25s,opacity .2s;margin:4px 0}
.hamburger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-drawer{display:none;position:fixed;top:var(--nav-h);left:0;right:0;z-index:99;background:rgba(254,248,240,.98);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(180,130,110,.12);padding:1rem;flex-direction:column;gap:.35rem;animation:drawerIn .2s ease}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mobile-drawer.open{display:flex}
.mobile-drawer a{text-decoration:none;font-size:.95rem;font-weight:600;color:var(--texte-doux);padding:.6rem 1rem;border-radius:12px;transition:background .15s}
.mobile-drawer a:hover,.mobile-drawer a.active{background:var(--beige);color:var(--texte)}
.drawer-lang{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem}
.drawer-lang-label{font-size:.82rem;color:var(--texte-doux);font-weight:600}

/* PAGE */
header{position:relative;z-index:10;text-align:center;padding:2.5rem 1rem 1.5rem}
.logo-icon{width:68px;height:68px;background:var(--blanc);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.9rem;box-shadow:0 4px 20px var(--shadow),0 0 0 6px rgba(247,197,213,.4);margin-bottom:.7rem;animation:bobble 3s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
.site-title{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,6vw,3rem);font-weight:800;line-height:1.1}
.site-title span{color:var(--rose-d)}
.tagline{font-size:clamp(.85rem,2.5vw,1rem);color:var(--texte-doux);font-weight:500;margin-top:.35rem}
.deco-badges{display:flex;gap:.5rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.badge{background:var(--blanc);border-radius:100px;padding:.28rem .8rem;font-size:.78rem;font-weight:600;color:var(--texte-doux);box-shadow:0 2px 8px var(--shadow);border:1.5px solid rgba(180,130,110,.12);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.top-bar{position:relative;z-index:10;display:flex;justify-content:center;gap:.6rem;padding:0 1rem 1.25rem;flex-wrap:wrap}
.top-pill{background:var(--blanc);border-radius:100px;padding:.38rem .85rem;font-size:.78rem;font-weight:600;color:var(--texte-doux);box-shadow:0 2px 10px var(--shadow);display:flex;align-items:center;gap:.35rem;border:1.5px solid rgba(180,130,110,.1)}
main{position:relative;z-index:10;max-width:820px;margin:0 auto;padding:0 1rem 4rem}
.section-title{font-size:.78rem;font-weight:700;color:var(--texte-doux);text-align:center;margin-bottom:1.2rem;text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:.6rem;justify-content:center}
.section-title::before,.section-title::after{content:'';height:1.5px;width:32px;background:var(--brun);opacity:.2;border-radius:2px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.75rem}
.stat-card{background:var(--blanc);border-radius:16px;padding:.9rem .7rem;text-align:center;box-shadow:0 3px 14px var(--shadow);border:1.5px solid rgba(180,130,110,.08);animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.stat-icon{font-size:1.35rem;margin-bottom:.2rem}
.stat-value{font-family:'Nunito',sans-serif;font-size:1.55rem;font-weight:800;color:var(--texte);line-height:1;margin-bottom:.15rem}
.stat-label{font-size:.66rem;font-weight:600;color:var(--texte-doux);text-transform:uppercase;letter-spacing:.08em}

/* GAME CARDS */
.games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,278px),1fr));gap:1rem;margin-bottom:2rem}
.game-card{background:var(--blanc);border-radius:22px;padding:1.35rem 1.25rem 1.15rem;box-shadow:0 4px 22px var(--shadow);border:1.5px solid rgba(180,130,110,.1);text-decoration:none;display:block;position:relative;overflow:hidden;animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) backwards;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .2s}
@media(hover:hover){.game-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 10px 30px var(--shadow)}}
.game-card:active{transform:scale(.98)}
.card-color-blob{position:absolute;top:-18px;right:-18px;width:88px;height:88px;border-radius:50%;opacity:.25;transition:opacity .2s,transform .3s}
.game-card:hover .card-color-blob{opacity:.38;transform:scale(1.15)}
.card-icon-wrap{width:48px;height:48px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;margin-bottom:.8rem;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.game-card:hover .card-icon-wrap{transform:scale(1.08) rotate(5deg)}
.card-tag{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:.2rem .58rem;border-radius:100px;display:inline-block;margin-bottom:.38rem}
.card-title{font-family:'Nunito',sans-serif;font-size:1.25rem;font-weight:800;color:var(--texte);margin-bottom:.32rem}
.card-desc{font-size:.83rem;color:var(--texte-doux);line-height:1.5;margin-bottom:.9rem;font-weight:500}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-status{display:flex;align-items:center;gap:.32rem;font-size:.76rem;font-weight:600}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--menthe-d);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.card-btn{background:var(--texte);color:var(--blanc);border:none;border-radius:100px;padding:.4rem .95rem;font-family:'Quicksand',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:background .2s}
.card-btn:hover{background:var(--brun-d)}
.card-soon{opacity:.6;cursor:default}
.card-soon:hover{transform:none !important;box-shadow:0 4px 22px var(--shadow) !important}
.soon-badge{background:var(--beige);color:var(--brun);font-size:.66rem;font-weight:700;padding:.25rem .65rem;border-radius:100px;text-transform:uppercase;letter-spacing:.08em}
.card-sutom .card-color-blob{background:var(--rose)}
.card-wiki  .card-color-blob{background:var(--lavande)}
.card-soon1 .card-color-blob{background:var(--menthe)}
.card-soon2 .card-color-blob{background:var(--pêche)}
.card-sutom .card-icon-wrap{background:rgba(247,197,213,.35)}
.card-wiki  .card-icon-wrap{background:rgba(212,197,247,.35)}
.card-soon1 .card-icon-wrap{background:rgba(197,240,224,.35)}
.card-soon2 .card-icon-wrap{background:rgba(251,213,181,.35)}
.card-sutom .card-tag{background:rgba(247,197,213,.4);color:var(--rose-d)}
.card-wiki  .card-tag{background:rgba(212,197,247,.4);color:var(--lavande-d)}
.card-soon1 .card-tag{background:rgba(197,240,224,.4);color:var(--menthe-d)}
.card-soon2 .card-tag{background:rgba(251,213,181,.4);color:var(--pêche-d)}


.card-phone .card-color-blob{background:var(--menthe)}
.card-phone .card-icon-wrap{background:rgba(197,240,224,.35)}
.card-phone .card-tag{background:rgba(197,240,224,.4);color:var(--menthe-d)}
/* LEADERBOARD */
.lb-card{background:var(--blanc);border-radius:20px;padding:1.2rem 1.1rem;box-shadow:0 4px 20px var(--shadow);border:1.5px solid rgba(180,130,110,.1);margin-bottom:2rem}
.lb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:.4rem}
.lb-title{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800}
.lb-date{font-size:.72rem;font-weight:600;color:var(--texte-doux)}
.lb-row{display:flex;align-items:center;gap:.65rem;padding:.55rem 0;border-bottom:1px solid rgba(180,130,110,.08)}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;flex-shrink:0}
.lb-rank.gold{background:#fde68a;color:#b45309}
.lb-rank.silver{background:#e2e8f0;color:#475569}
.lb-rank.bronze{background:#fcd9bd;color:#9a3412}
.lb-rank.other{background:var(--beige);color:var(--texte-doux)}
.lb-name{flex:1;font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-game{font-size:.7rem;color:var(--texte-doux);font-weight:600;padding:.12rem .45rem;border-radius:100px;background:var(--beige);flex-shrink:0}
.lb-score{font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;color:var(--rose-d);flex-shrink:0}
.lb-empty{text-align:center;padding:1.5rem;color:var(--texte-doux);font-size:.88rem;font-weight:500}
.lb-loading{text-align:center;padding:1.2rem;color:var(--texte-doux);font-size:.85rem}

footer{position:relative;z-index:10;text-align:center;padding:1.2rem 1rem;font-size:.76rem;color:var(--brun);opacity:.7}

/* RESPONSIVE */
@media(max-width:600px){
  .nav-center{display:none}
  .hamburger{display:block}
  header{padding:2rem 1rem 1.2rem}
  .logo-icon{width:58px;height:58px;font-size:1.6rem}
  .top-bar{gap:.4rem;padding-bottom:1rem}
  .top-pill{font-size:.72rem;padding:.32rem .7rem}
  .games-grid{grid-template-columns:1fr}
  .stats-row{gap:.55rem}
  .stat-value{font-size:1.35rem}
  .lb-card{padding:1rem .9rem}
}
@media(min-width:601px){
  .hamburger{display:none}
  .mobile-drawer{display:none !important}
}

/* LANG PICKER MODAL */
.lang-modal-overlay{display:none;position:fixed;inset:0;background:rgba(74,55,40,.45);z-index:500;backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:1rem}
.lang-modal-overlay.open{display:flex}
.lang-modal{background:var(--blanc);border-radius:26px;max-width:340px;width:100%;padding:2rem 1.75rem 1.75rem;box-shadow:0 24px 60px rgba(74,55,40,.28);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);text-align:center}
.lang-modal-icon{font-size:2.6rem;margin-bottom:.6rem}
.lang-modal-title{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:.3rem;color:var(--texte)}
.lang-modal-sub{font-size:.84rem;color:var(--texte-doux);font-weight:500;margin-bottom:1.5rem;line-height:1.5}
.lang-choices{display:flex;gap:.75rem;justify-content:center}
.lang-choice{flex:1;border:2.5px solid rgba(180,130,110,.2);border-radius:18px;padding:1rem .75rem;cursor:pointer;background:var(--blanc);transition:border-color .18s,transform .18s,box-shadow .18s;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.lang-choice:hover{border-color:var(--rose-d);transform:translateY(-3px);box-shadow:0 8px 24px var(--shadow)}
.lang-choice-flag{font-size:2rem;line-height:1}
.lang-choice-name{font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;color:var(--texte)}
.lang-choice-sub{font-size:.72rem;color:var(--texte-doux);font-weight:500}
</style>
</head>
<body>
<div class="floaties" id="floaties"></div>

<nav class="nav">
  <a href="index.html" class="nav-logo">🌸 Mots <span>Doux</span></a>
  <ul class="nav-center" id="nav-links">
    <li><a href="index.html" class="active" data-i18n="home"></a></li>
    <li><a href="sutom.html" data-i18n="sutom"></a></li>
    <li><a href="wiki.html" data-i18n="wiki"></a></li>
    <li><a href="game.html" data-i18n="game_nav"></a></li>
  </ul>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="mobile-drawer" id="mobile-drawer">
  <a href="index.html" class="active" data-i18n="home"></a>
  <a href="sutom.html" data-i18n="sutom"></a>
  <a href="wiki.html" data-i18n="wiki"></a>
  <a href="game.html" data-i18n="game_nav"></a>
  <div class="drawer-lang">
    <span class="drawer-lang-label">🌍</span>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div>

<header>
  <div class="logo-icon">🌸</div>
  <h1 class="site-title">Mots <span>Doux</span></h1>
  <p class="tagline" data-i18n="tagline"></p>
  <div class="deco-badges">
    <span class="badge" style="animation-delay:.1s" data-i18n="badge_free"></span>
    <span class="badge" style="animation-delay:.2s" data-i18n="badge_daily"></span>
    <span class="badge" style="animation-delay:.3s" data-i18n="badge_games"></span>
  </div>
</header>

<div class="top-bar">
  <div class="top-pill">📅 <span id="today-date"></span></div>
  <div class="top-pill">🔥 <span id="streak-count"></span></div>
  <div class="top-pill">⏰ <span id="next-refresh"></span></div>
</div>

<main>
  <div style="margin-bottom:1.75rem">
    <div class="section-title" data-i18n="stats_title"></div>
    <div class="stats-row">
      <div class="stat-card" style="animation-delay:.1s"><div class="stat-icon">🎯</div><div class="stat-value" id="stat-played">0</div><div class="stat-label" data-i18n="stat_played"></div></div>
      <div class="stat-card" style="animation-delay:.2s"><div class="stat-icon">🏆</div><div class="stat-value" id="stat-wins">0</div><div class="stat-label" data-i18n="stat_won"></div></div>
      <div class="stat-card" style="animation-delay:.3s"><div class="stat-icon">⭐</div><div class="stat-value" id="stat-streak">0</div><div class="stat-label" data-i18n="stat_streak"></div></div>
    </div>
  </div>

  <div class="section-title" data-i18n="games_title"></div>
  <div class="games-grid">
    <a class="game-card card-sutom" href="sutom.html" style="animation-delay:.1s">
      <div class="card-color-blob"></div><div class="card-icon-wrap">🔤</div>
      <span class="card-tag" data-i18n="card_sutom_tag"></span>
      <h2 class="card-title">Sutom</h2>
      <p class="card-desc" data-i18n="card_sutom_desc"></p>
      <div class="card-footer">
        <div class="card-status"><span class="status-dot"></span><span style="color:var(--menthe-d)" data-i18n="available"></span></div>
        <button class="card-btn" data-i18n="play"></button>
      </div>
    </a>
    <a class="game-card card-wiki" href="wiki.html" style="animation-delay:.2s">
      <div class="card-color-blob"></div><div class="card-icon-wrap">📖</div>
      <span class="card-tag" data-i18n="card_wiki_tag"></span>
      <h2 class="card-title" data-i18n="wiki_nav"></h2>
      <p class="card-desc" data-i18n="card_wiki_desc"></p>
      <div class="card-footer">
        <div class="card-status"><span class="status-dot"></span><span style="color:var(--menthe-d)" data-i18n="available"></span></div>
        <button class="card-btn" data-i18n="play"></button>
      </div>
    </a>
    <a class="game-card card-phone" href="game.html" style="animation-delay:.3s">
      <div class="card-color-blob"></div><div class="card-icon-wrap">🎨</div>
      <span class="card-tag" data-i18n="card_phone_tag"></span>
      <h2 class="card-title" data-i18n="card_phone_title"></h2>
      <p class="card-desc" data-i18n="card_phone_desc"></p>
      <div class="card-footer">
        <div class="card-status"><span class="status-dot"></span><span style="color:var(--menthe-d)" data-i18n="available"></span></div>
        <button class="card-btn" data-i18n="play"></button>
      </div>
    </a>
    <div class="game-card card-soon card-soon1" style="animation-delay:.3s">
      <div class="card-color-blob"></div><div class="card-icon-wrap">🔀</div>
      <span class="card-tag" data-i18n="card_anagram_tag"></span>
      <h2 class="card-title" data-i18n="card_anagram_title"></h2>
      <p class="card-desc" data-i18n="card_anagram_desc"></p>
      <div class="card-footer"><span class="soon-badge" data-i18n="coming_soon"></span></div>
    </div>
    <div class="game-card card-soon card-soon2" style="animation-delay:.4s">
      <div class="card-color-blob"></div><div class="card-icon-wrap">💭</div>
      <span class="card-tag" data-i18n="card_charade_tag"></span>
      <h2 class="card-title" data-i18n="card_charade_title"></h2>
      <p class="card-desc" data-i18n="card_charade_desc"></p>
      <div class="card-footer"><span class="soon-badge" data-i18n="coming_soon"></span></div>
    </div>
  </div>

  <div class="section-title" data-i18n="lb_section"></div>
  <div class="lb-card">
    <div class="lb-header">
      <span class="lb-title" data-i18n="lb_title"></span>
      <span class="lb-date" id="lb-date"></span>
    </div>
    <div id="lb-body"><div class="lb-loading" data-i18n="lb_loading"></div></div>
  </div>
</main>

<footer data-i18n="footer"></footer>


<!-- Lang picker modal -->
<div class="lang-modal-overlay" id="lang-modal">
  <div class="lang-modal">
    <div class="lang-modal-icon">🌍</div>
    <div class="lang-modal-title">Choisissez votre langue</div>
    <div class="lang-modal-sub">Choose your language · Vous pourrez changer à tout moment</div>
    <div class="lang-choices">
      <button class="lang-choice" onclick="pickLang('fr')">
        <span class="lang-choice-flag">🇫🇷</span>
        <span class="lang-choice-name">Français</span>
        <span class="lang-choice-sub">Mots français</span>
      </button>
      <button class="lang-choice" onclick="pickLang('en')">
        <span class="lang-choice-flag">🇬🇧</span>
        <span class="lang-choice-name">English</span>
        <span class="lang-choice-sub">English words</span>
      </button>
    </div>
  </div>
</div>
<script>
const T = {
  fr:{
    home:"Accueil",sutom:"🔤 Sutom",wiki:"📖 Wikipédia",game_nav:"🎨 Téléphone",wiki_nav:"Mot Wikipédia",
    tagline:"ton coin quotidien de jeux de mots ♡",
    badge_free:"✨ Gratuit",badge_daily:"🌙 Chaque jour",badge_games:"🎮 Plusieurs jeux",
    stats_title:"Tes stats du jour",stat_played:"Joués",stat_won:"Gagnés",stat_streak:"Série",
    games_title:"Jeux du jour",
    card_sutom_tag:"Mots",card_sutom_desc:"Trouve le mot du jour en 6 essais. La première lettre est révélée — à toi de deviner !",
    card_wiki_tag:"Culture",card_wiki_desc:"Révèle le texte de l'article Wikipédia mot par mot, puis devine son titre !",
    card_phone_tag:"Multijoueur",card_phone_title:"Téléphone Dessiné",card_phone_desc:"Dessine un mot, passe-le à ton voisin qui devine… et vois comment ça dérive !",card_anagram_tag:"Lettres",card_anagram_title:"Anagramme",card_anagram_desc:"Remets les lettres dans le bon ordre pour retrouver le mot caché du jour.",
    card_charade_tag:"Devinette",card_charade_title:"Charade",card_charade_desc:"Mon premier, mon second, mon tout… résous la charade quotidienne.",
    coming_soon:"À venir",available:"Disponible",play:"Jouer →",
    lb_section:"🏆 Leaderboard",lb_title:"Meilleurs scores du jour",lb_loading:"Chargement…",lb_empty:"Sois le premier à jouer !",
    footer:"fait avec ♡ • mots doux 2025 • reset chaque jour à minuit",
  },
  en:{
    home:"Home",sutom:"🔤 Sutom",wiki:"📖 Wikipedia",game_nav:"🎨 Drawing",wiki_nav:"Wikipedia Word",
    tagline:"your daily word games corner ♡",
    badge_free:"✨ Free",badge_daily:"🌙 Every day",badge_games:"🎮 Multiple games",
    stats_title:"Your stats today",stat_played:"Played",stat_won:"Won",stat_streak:"Streak",
    games_title:"Today's games",
    card_sutom_tag:"Words",card_sutom_desc:"Find the word of the day in 6 tries. The first letter is given — can you guess it?",
    card_wiki_tag:"Culture",card_wiki_desc:"Reveal the Wikipedia article word by word, then guess its title!",
    card_phone_tag:"Multiplayer",card_phone_title:"Drawing Telephone",card_phone_desc:"Draw a word, pass it to your neighbor who guesses… see how far it drifts!",card_anagram_tag:"Letters",card_anagram_title:"Anagram",card_anagram_desc:"Rearrange the letters to find the hidden word of the day.",
    card_charade_tag:"Riddle",card_charade_title:"Riddle",card_charade_desc:"Solve the daily riddle in as few tries as possible.",
    coming_soon:"Coming soon",available:"Available",play:"Play →",
    lb_section:"🏆 Leaderboard",lb_title:"Top scores today",lb_loading:"Loading…",lb_empty:"Be the first to play!",
    footer:"made with ♡ • mots doux 2025 • resets daily at midnight",
  }
};

let lang = localStorage.getItem('md-lang') || (navigator.language.startsWith('en') ? 'en' : 'fr');

function t(k){ return (T[lang]&&T[lang][k]) || (T.fr[k]) || k; }

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
  document.documentElement.lang=lang;
  const locale = lang==='en'?'en-US':'fr-FR';
  const now=new Date();
  document.getElementById('today-date').textContent=now.toLocaleDateString(locale,{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('lb-date').textContent=now.toLocaleDateString(locale,{day:'numeric',month:'long'});
  updateCountdown();
  const s=JSON.parse(localStorage.getItem('motsdoux-stats')||'{"played":0,"wins":0,"streak":0}');
  document.getElementById('streak-count').textContent = s.streak>0
    ? (lang==='en'?`${s.streak} day${s.streak>1?'s':''} in a row 🔥`:`${s.streak} jour${s.streak>1?'s':''} de suite 🔥`)
    : (lang==='en'?"Let's go!":'Lance-toi !');
}

function setLang(l){ lang=l; localStorage.setItem('md-lang',l); applyLang(); toggleMenu(true); }

function updateCountdown(){
  const n=new Date(),m=new Date(n); m.setHours(24,0,0,0);
  const d=m-n,h=Math.floor(d/3600000),mn=Math.floor((d%3600000)/60000);
  document.getElementById('next-refresh').textContent=
    lang==='en'?`resets in ${h}h${String(mn).padStart(2,'0')}`:`reset dans ${h}h${String(mn).padStart(2,'0')}`;
}

// STATS
const s=JSON.parse(localStorage.getItem('motsdoux-stats')||'{"played":0,"wins":0,"streak":0}');
document.getElementById('stat-played').textContent=s.played;
document.getElementById('stat-wins').textContent=s.wins;
document.getElementById('stat-streak').textContent=s.streak;

// LEADERBOARD
function escHtml(v){ return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }

async function loadLeaderboard(){
  const today=new Date().toISOString().slice(0,10);
  const lbKey=`lb:${today}`;
  try{
    const res=await fetch(`/api/leaderboard?date=${today}`);
    if(res.ok){const data=await res.json();renderLb(data.scores||[]);return;}
  }catch(e){}
  try{const r=localStorage.getItem(lbKey);renderLb(r?JSON.parse(r):[]);}catch(e){renderLb([]);}
}

function renderLb(scores){
  const body=document.getElementById('lb-body');
  if(!scores.length){ body.innerHTML=`<div class="lb-empty">${t('lb_empty')}</div>`; return; }
  scores.sort((a,b)=>b.score-a.score);
  const rc=['gold','silver','bronze'];
  body.innerHTML=scores.slice(0,10).map((r,i)=>`
    <div class="lb-row">
      <div class="lb-rank ${rc[i]||'other'}">${i===0?'👑':i+1}</div>
      <span class="lb-name">${escHtml(r.name)}</span>
      <span class="lb-game">${escHtml(r.game)}</span>
      <span class="lb-score">${r.score} pts</span>
    </div>`).join('');
}

// FLOATIES
const fc=document.getElementById('floaties');
['#f7c5d5','#d4c5f7','#c5f0e0','#fbd5b5'].forEach(c=>{
  for(let i=0;i<4;i++){
    const b=document.createElement('div'); b.className='floatie';
    const sz=20+Math.random()*55;
    b.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${c};animation-duration:${13+Math.random()*18}s;animation-delay:${Math.random()*14}s;`;
    fc.appendChild(b);
  }
});

// MOBILE MENU
function toggleMenu(forceClose){
  const d=document.getElementById('mobile-drawer'),h=document.getElementById('hamburger');
  const open=forceClose?false:!d.classList.contains('open');
  d.classList.toggle('open',open); h.classList.toggle('open',open);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.nav')&&!e.target.closest('.mobile-drawer')) toggleMenu(true);
});

applyLang();
setInterval(updateCountdown,60000);
loadLeaderboard();

// LANG PICKER
function pickLang(l){
  document.getElementById('lang-modal').classList.remove('open');
  setLang(l);
}
if(!localStorage.getItem('md-lang')){
  document.getElementById('lang-modal').classList.add('open');
}
</script>
</body>
</html>
